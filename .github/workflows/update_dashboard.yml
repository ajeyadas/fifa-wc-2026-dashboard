name: Update Live Scores

on:
  schedule:
    # Runs every 10 minutes.
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # This allows you to also trigger it manually from the Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client

      - name: Create credentials.json securely and Run Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > src/main/java/com/google/credentials.json
          cd src/main/java/com/google/
          python update_dashboard.py
